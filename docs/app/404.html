<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TSLab</title>
    <script>
      // GitHub Pages SPA fallback (cloud deploy). GitHub serves this file for any unknown deep
      // path, including the OAuth /auth/callback?code=... redirect.
      //
      // It intentionally contains NO hashed bundle references. A 404.html that embeds hashed asset
      // names goes stale after every deploy: a cached copy points at a now-deleted bundle and the
      // page renders blank (black screen). Instead, stash the original deep link and bounce to the
      // app entry, which always loads the current bundle. The app restores the route on boot
      // (see src/services/spaRedirectRestore.ts). This file is static, so caching it is harmless.
      (function () {
        var base = '/tslab-cloud/app/';
        try {
          sessionStorage.setItem(
            'spaRedirectPath',
            location.pathname + location.search + location.hash
          );
        } catch (e) {}
        location.replace(base);
      })();
    </script>
  </head>
  <body></body>
</html>
